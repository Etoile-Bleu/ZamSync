# Inventory for running Ansible from INSIDE the hub VM (Windows-compatible).
# The private key path /home/vagrant/.ssh/id_rsa is set up by bootstrap.sh.
#
# If running from the HOST on Linux/macOS, replace the key path with:
#   ../.vagrant/machines/<name>/virtualbox/private_key

[hub]
hub ansible_host=192.168.56.10 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa ansible_connection=local

[clinics]
clinic-1 ansible_host=192.168.56.11 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa
clinic-2 ansible_host=192.168.56.12 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa
clinic-3 ansible_host=192.168.56.13 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa
clinic-4 ansible_host=192.168.56.14 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa

[all:children]
hub
clinics
